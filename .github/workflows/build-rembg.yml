name: Build eBay Image Tool rembg

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - v3.3-rembg
      - git-checkout-b-v3.3-rembg

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            artifact_name: eBayImageTool_Windows_standalone

          - os: macos-13
            platform: mac
            artifact_name: eBayImageTool_macOS_standalone

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows runtime
        if: matrix.platform == 'windows'
        shell: cmd
        run: |
          pyinstaller --noconfirm --clean --onedir --name eBayImageToolCore ^
            --collect-all cv2 ^
            --collect-all PIL ^
            --collect-all numpy ^
            --collect-all google.genai ^
            --collect-all pydantic ^
            --collect-all rembg ^
            --collect-all onnxruntime ^
            --collect-all pymatting ^
            app_auto.py

          python build_tools\package_release.py --platform windows

      - name: Build Mac runtime
        if: matrix.platform == 'mac'
        shell: bash
        run: |
          pyinstaller --noconfirm --clean --onedir --name eBayImageToolCore \
            --collect-all cv2 \
            --collect-all PIL \
            --collect-all numpy \
            --collect-all google.genai \
            --collect-all pydantic \
            --collect-all rembg \
            --collect-all onnxruntime \
            --collect-all pymatting \
            app_auto.py

          python build_tools/package_release.py --platform mac

      - name: Upload standalone package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: release_artifacts/${{ matrix.artifact_name }}.zip
